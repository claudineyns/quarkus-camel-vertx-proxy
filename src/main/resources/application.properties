# --- HTTP server limits ---
# Tamanho máximo do corpo da requisição. O padrão Vert.x é 10m; para um proxy de
# payloads grandes sem bufferização, o teto deve ser definido explicitamente.
quarkus.http.limits.max-body-size=100m

# --- Ports ---
quarkus.http.port=8080
quarkus.http.insecure-requests=enabled
quarkus.http.http2=true

# Management interface (health + metrics isolated from proxy traffic)
quarkus.management.enabled=true
quarkus.management.port=9000

# --- TLS (prod profile only — certs mounted at /deployments/certs in container) ---
# Named config scoped to the main HTTP server only; management stays on plain HTTP.
%prod.quarkus.http.ssl-port=8443
%prod.quarkus.http.tls-configuration-name=proxy-tls
%prod.quarkus.tls.proxy-tls.key-store.pem.0.cert=/deployments/certs/server.crt
%prod.quarkus.tls.proxy-tls.key-store.pem.0.key=/deployments/certs/server.key

# --- Graceful shutdown ---
quarkus.shutdown.timeout=PT30S

# --- Camel ---
camel.main.stream-caching-enabled=false

# --- Proxy: HTTP client pool ---
# Para backends H2 (padrão de APIs de IA hospedadas), o HWM=20 é o limitante efetivo —
# streams são multiplexados sobre as conexões H2 conforme MAX_CONCURRENT_STREAMS do servidor.
# Para backends H1 (IA auto-hospedada), max-connections-per-host é o limitante direto;
# alinhado ao HWM para que memória e pool impõem o mesmo teto de concorrência.
proxy.http.client.pool.max-connections-per-host=20
proxy.http.client.pool.http2-max-connections-per-host=5
proxy.http.client.pool.max-wait-queue-size=-1

# --- Proxy: in-flight request limit (HWM) ---
# Maximum number of concurrent in-flight requests. Requests above this threshold are
# rejected with 503 and Readiness reports DOWN. -1 disables the limit.
# Dimensionado para o cenário de stress: floor(320 MB × 0.60 / 10 MB de payload max) = 19 → 20.
# Com payloads médios de 3 MB o headroom é amplo; no pico de stress (10 MB) limita o
# in-flight a 200 MB — dentro do demonstrado no teste de carga.
proxy.active-requests.limit=20

# --- Proxy: HTTP client timeouts ---
# connect-timeout: estabelecimento de conexão TCP — 5 s é adequado.
# response-timeout: tempo até a chegada do primeiro byte da resposta. Para backends de IA
#   (LLMs, visão computacional), inferência pode levar dezenas de segundos; 5 s causaria
#   timeouts incorretos e abertura indevida do circuit breaker. Padrão: 120 s.
#   Sobrescrever via PROXY_HTTP_CLIENT_RESPONSE_TIMEOUT_MS para ambientes com backends
#   convencionais que exigem um teto mais conservador.
# idle-timeout: conexão ociosa no pool — mantido em 60 s para liberar conexões após
#   janelas longas de inferência sem nova requisição.
proxy.http.client.connect-timeout-ms=5000
proxy.http.client.response-timeout-ms=120000
proxy.http.client.idle-timeout-s=60

# --- Proxy: circuit breaker ---
proxy.http.client.circuit-breaker.sliding-window-size=10
proxy.http.client.circuit-breaker.minimum-number-of-calls=5
proxy.http.client.circuit-breaker.failure-rate-threshold=50
proxy.http.client.circuit-breaker.wait-duration-open-ms=30000
proxy.http.client.circuit-breaker.permitted-calls-half-open=3
